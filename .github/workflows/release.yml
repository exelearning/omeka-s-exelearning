---
name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release label for package name (e.g. 1.2.3 or 1.2.3-beta)"
        required: false
        default: ""
      editor_repo_url:
        description: "Editor source repository URL"
        required: false
        default: "https://github.com/exelearning/exelearning.git"
      editor_ref:
        description: "Editor ref value (main, branch name, or tag)"
        required: false
        default: "main"
      editor_ref_type:
        description: "Type of editor ref"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - branch
          - tag

permissions:
  contents: write

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set environment variables
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            RAW_TAG="${GITHUB_REF##*/}"
            VERSION_TAG="${RAW_TAG#v}"
            echo "RELEASE_TAG=${VERSION_TAG}" >> $GITHUB_ENV
            echo "EXELEARNING_EDITOR_REPO_URL=https://github.com/exelearning/exelearning.git" >> $GITHUB_ENV
            echo "EXELEARNING_EDITOR_REF=${RAW_TAG}" >> $GITHUB_ENV
            echo "EXELEARNING_EDITOR_REF_TYPE=auto" >> $GITHUB_ENV
          else
            INPUT_RELEASE="${{ github.event.inputs.release_tag }}"
            if [ -z "$INPUT_RELEASE" ]; then
              INPUT_RELEASE="manual-$(date +%Y%m%d)-${GITHUB_SHA::7}"
            fi
            echo "RELEASE_TAG=${INPUT_RELEASE}" >> $GITHUB_ENV
            echo "EXELEARNING_EDITOR_REPO_URL=${{ github.event.inputs.editor_repo_url }}" >> $GITHUB_ENV
            echo "EXELEARNING_EDITOR_REF=${{ github.event.inputs.editor_ref }}" >> $GITHUB_ENV
            echo "EXELEARNING_EDITOR_REF_TYPE=${{ github.event.inputs.editor_ref_type }}" >> $GITHUB_ENV
          fi

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Build static editor
        run: make build-editor

      - name: Create package
        run: make package VERSION=${RELEASE_TAG}

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ExeLearning-${{ env.RELEASE_TAG }}
          path: ExeLearning-${{ env.RELEASE_TAG }}.zip

      - name: Build Playground URL for this release
        if: github.event_name == 'push'
        id: playground
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/ExeLearning-${RELEASE_TAG}.zip"
          BLUEPRINT=$(jq --arg url "$RELEASE_URL" '.modules[0].source.url = $url' blueprint.json)
          ENCODED=$(echo "$BLUEPRINT" | base64 -w 0 | tr '+/' '-_' | tr -d '=')
          echo "url=https://ateeducacion.github.io/omeka-s-playground/?blueprint-data=${ENCODED}" >> $GITHUB_OUTPUT

      - name: Publish/Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || env.RELEASE_TAG }}
          files: ExeLearning-${{ env.RELEASE_TAG }}.zip
          generate_release_notes: true
          append_body: true
          body: |

            ---

            <a href="${{ steps.playground.outputs.url }}"><img src="https://raw.githubusercontent.com/ateeducacion/omeka-s-playground/main/ogimage.png" alt="Try eXeLearning in your browser" width="220"></a><br>
            <small><a href="${{ steps.playground.outputs.url }}">Try in your browser</a></small>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
